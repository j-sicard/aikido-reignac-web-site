name: Deploy — Prod

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3
  WORKING_DIR_INFRA: aikido-infra
  WORKING_DIR_APP: aikido
  TF_VAR_FILE: env/prod.tfvars

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR_APP }}
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        working-directory: ${{ env.WORKING_DIR_APP }}
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-prod
          path: ${{ env.WORKING_DIR_APP }}/coverage/lcov.info
          retention-days: 7

  # ── 2. Build du site ────────────────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR_APP }}
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: ${{ env.WORKING_DIR_APP }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: ${{ env.WORKING_DIR_APP }}/dist
          retention-days: 1

  # ── 2. Terraform Plan ───────────────────────────────────────────────────────
  infra-plan:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest
    environment: prod
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR_INFRA }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR_INFRA }}
        run: terraform plan -var-file="${{ env.TF_VAR_FILE }}" -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR_INFRA }}/tfplan
          retention-days: 1

  # ── 3. Terraform Apply (gate manuel) ────────────────────────────────────────
  infra-apply:
    name: Terraform Apply (prod)
    runs-on: ubuntu-latest
    environment: prod   # ← Required reviewers à configurer dans GitHub Settings
    needs: infra-plan

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR_INFRA }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR_INFRA }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR_INFRA }}
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        working-directory: ${{ env.WORKING_DIR_INFRA }}
        id: tf_outputs
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw distribution_id)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

    outputs:
      bucket_name: ${{ steps.tf_outputs.outputs.bucket_name }}
      distribution_id: ${{ steps.tf_outputs.outputs.distribution_id }}
      site_url: ${{ steps.tf_outputs.outputs.site_url }}

  # ── 4. Deploy S3 + invalidation CloudFront ──────────────────────────────────
  deploy:
    name: Deploy to S3 (prod)
    runs-on: ubuntu-latest
    environment: prod
    needs: infra-apply

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: dist

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ needs.infra-apply.outputs.bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.infra-apply.outputs.distribution_id }} \
            --paths "/*"

      - name: Summary
        run: echo "✅ Deployed to ${{ needs.infra-apply.outputs.site_url }}"
